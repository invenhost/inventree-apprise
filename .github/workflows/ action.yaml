name: Plugin action
on:
  push:
    branches: ['main', 'master']
  pull_request:
    types: [opened, edited, reopened]
  release:
    types: [published]

jobs:
  plugin-action:
    uses: matmair/inventree-meta-plugin/.github/workflows/plugin_action.yaml@next
    with:
      python_version: 3.13
    permissions:
      id-token: write
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    name: CI
